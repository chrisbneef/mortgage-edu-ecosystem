<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#ffffff" />
    <meta name="description" content="Homebuyer & mortgage education library" />
    <title>Education</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Hanken+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!--
      The themed CSS variables are written before first paint by the inline bootstrap
      script that vite-plugin-theme-bootstrap injects here (head-prepend). The values
      below are fallbacks only, used if JS is disabled.
    -->
    <style>
      :root {
        --background: 0 0% 100%;
        --foreground: 222 18% 11%;
        --card: 0 0% 100%;
        --card-foreground: 222 18% 11%;
        --popover: 0 0% 100%;
        --popover-foreground: 222 18% 11%;
        --primary: 221 83% 53%;
        --primary-foreground: 0 0% 100%;
        --secondary: 220 14% 96%;
        --secondary-foreground: 222 18% 11%;
        --muted: 220 14% 96%;
        --muted-foreground: 220 9% 46%;
        --accent: 38 92% 50%;
        --accent-foreground: 222 18% 11%;
        --destructive: 0 84% 60%;
        --destructive-foreground: 0 0% 100%;
        --border: 220 13% 91%;
        --input: 220 13% 91%;
        --ring: 221 83% 53%;
        --radius: 0.75rem;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
